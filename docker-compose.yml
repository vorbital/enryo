services:
  enryo-db:
    image: postgres:16-alpine
    container_name: enryo-db
    environment:
      POSTGRES_USER: enryo
      POSTGRES_PASSWORD: enryo_dev_password
      POSTGRES_DB: enryo
    ports:
      - "5433:5432"
    volumes:
      - enryo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enryo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local LLM server for embedding generation
  enryo-llm:
    image: ghcr.io/ggerganov/llama.cpp/server:latest
    container_name: enryo-llm
    environment:
      MODEL: ./models/embedding-model.gguf
    ports:
      - "8081:8080"
    volumes:
      - ./llm/models:/models
    profiles:
      - llm
    restart: unless-stopped

  # Alternative: Use Ollama for simpler setup
  enryo-ollama:
    image: ollama/ollama:latest
    container_name: enryo-ollama
    ports:
      - "11435:11434"
    volumes:
      - enryo_ollama_data:/root/.ollama
    profiles:
      - ollama
    restart: unless-stopped

volumes:
  enryo_postgres_data:
  enryo_ollama_data:
