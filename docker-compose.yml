services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enryo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LLM server for embedding generation
  # Uses Ollama with sentence-transformers model
  llm:
    image: ghcr.io/ggerganov/llama.cpp/server:latest
    environment:
      MODEL: ./models/embedding-model.gguf
    ports:
      - "8080:8080"
    volumes:
      - ./llm/models:/models
    profiles:
      - llm

  # Alternative: Use Ollama for simpler setup
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  postgres_data:
  ollama_data:
